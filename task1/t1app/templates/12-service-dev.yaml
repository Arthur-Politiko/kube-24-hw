---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.dev.name }}-service
  namespace: {{ .Values.namespace | default "default" }}
spec:
  type: NodePort
  selector:
    app: {{ .Values.dev.name }}
  ports:
    - name: http
      port: {{ .Values.dev.service.port }}
      targetPort: {{ .Values.dev.service.port }}

