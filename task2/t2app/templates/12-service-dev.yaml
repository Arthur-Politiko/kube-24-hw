---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dev-service
  namespace: {{ .Values.namespace | default "default" }}
spec:
  type: NodePort
  selector:
    app: {{ .Release.Name }}-dev
  ports:
    - name: http
      port: {{ .Values.dev.service.port }}
      targetPort: {{ .Values.dev.service.port }}

