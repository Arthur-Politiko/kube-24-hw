---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web-service
  namespace: {{ .Values.namespace | default "default" }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-web
  ports:
    - name: http
      port:  {{ .Values.web.service.port }}
      targetPort: 80
